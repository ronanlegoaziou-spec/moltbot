name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Deploy the Worker and set the GITHUB_VEILLE_TOKEN secret it needs to
      # POST workflow_dispatch to veille-mail.yml at 8:15 Paris time.
      # Tries the scoped API token first, falls back to the Global API Key,
      # and uses whichever worked for both the deploy and the secret.
      - name: Deploy Worker + set GITHUB_VEILLE_TOKEN secret
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CF_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          GH_VEILLE: ${{ secrets.GH_VEILLE_TOKEN }}
        run: |
          set -uo pipefail
          AUTH=""
          echo "::group::Deploy attempt 1 — scoped API token"
          if CLOUDFLARE_API_TOKEN="$CF_TOKEN" npx wrangler deploy; then AUTH=token; fi
          echo "::endgroup::"
          if [ -z "$AUTH" ]; then
            echo "::group::Deploy attempt 2 — Global API Key"
            if CLOUDFLARE_API_KEY="$CF_KEY" CLOUDFLARE_EMAIL="$CF_EMAIL" npx wrangler deploy; then AUTH=key; fi
            echo "::endgroup::"
          fi
          if [ -z "$AUTH" ]; then
            echo "ERROR: both Cloudflare credentials failed to deploy."
            exit 1
          fi
          echo "Deployed via: $AUTH"

          URL="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/moltbot/secrets"
          DATA="{\"name\":\"GITHUB_VEILLE_TOKEN\",\"text\":\"${GH_VEILLE}\",\"type\":\"secret_text\"}"
          if [ "$AUTH" = token ]; then
            R=$(curl -s -X PUT "$URL" -H "Authorization: Bearer ${CF_TOKEN}" -H "Content-Type: application/json" --data "$DATA")
          else
            R=$(curl -s -X PUT "$URL" -H "X-Auth-Email: ${CF_EMAIL}" -H "X-Auth-Key: ${CF_KEY}" -H "Content-Type: application/json" --data "$DATA")
          fi
          if echo "$R" | grep -q '"success":true'; then
            echo "Secret GITHUB_VEILLE_TOKEN set OK"
          else
            echo "Secret PUT failed: $(echo "$R" | grep -o '"code":[0-9]*\|"message":"[^"]*"' | head)"
            exit 1
          fi
