name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # The Worker cron POSTs a workflow_dispatch to veille-mail.yml at 8:15
      # Paris time, so it needs a GitHub PAT (workflow scope) as a Worker
      # secret. Idempotent — re-set on every deploy to guarantee it's present.
      - name: Set GITHUB_VEILLE_TOKEN Worker secret
        run: printf '%s' "${{ secrets.GH_VEILLE_TOKEN }}" | npx wrangler secret put GITHUB_VEILLE_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
