name: Veille mail — Voxa

on:
  schedule:
    - cron: '15 6 * * 1-5'
    - cron: '15 7 * * 1-5'
  workflow_dispatch:

jobs:
  veille:
    name: Run veille mail
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run veille
        run: npx tsx scripts/run-veille.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VEILLE_SLACK_BOT_TOKEN: ${{ secrets.VEILLE_SLACK_BOT_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
